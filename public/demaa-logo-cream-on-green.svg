<svg
  width="1600"
  height="900"
  viewBox="0 0 1600 900"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-labelledby="demaaLogoTitle demaaLogoDesc"
>
  <title id="demaaLogoTitle">Demaa logo</title>
  <desc id="demaaLogoDesc">
    Demaa wordmark in cream on a forest green background.
  </desc>
  <rect width="1600" height="900" rx="72" fill="#315f46" />
  <text
    x="50%"
    y="50%"
    fill="#fafafa"
    font-family="Gambetta, Georgia, serif"
    font-size="260"
    font-style="italic"
    font-weight="700"
    letter-spacing="-0.06em"
    text-anchor="middle"
    dominant-baseline="middle"
  >
    Demaa
  </text>
</svg>

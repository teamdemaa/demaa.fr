name: Sync enterprise annuaire

on:
  push:
    branches:
      - main
    paths:
      - "src/lib/enterprise-annuaire.json"
      - "scripts/sync-enterprise-annuaire.mjs"
      - ".github/workflows/sync-enterprise-annuaire.yml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:
    inputs:
      only:
        description: "Optional comma-separated enterprise slugs to sync"
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Firebase credentials
        id: firebase-credentials
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_KEY" ] || { [ -n "$FIREBASE_PROJECT_ID" ] && [ -n "$FIREBASE_CLIENT_EMAIL" ] && [ -n "$FIREBASE_PRIVATE_KEY" ]; }; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Firebase credentials are not configured. Skipping Firestore sync."
          fi

      - name: Sync enterprise annuaire to Firestore
        if: steps.firebase-credentials.outputs.configured == 'true'
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          if [ -n "${{ inputs.only }}" ]; then
            npm run sync:enterprise-annuaire -- --only "${{ inputs.only }}"
          else
            npm run sync:enterprise-annuaire
          fi
